[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "polus-plugins-utils-bbbc-download-plugin"
version = "0.1.0-dev1"
description = "BBBC dataset download plugin"
readme = "README.md"
requires-python = ">=3.9,<4"
authors = [
    { name = "Saket Prem", email = "saket.prem@axleinfo.com" },
    { name = "Matthew McIntyre", email = "Matthew.McIntyre@axleinfo.com" },
]
dependencies = [
    "typer>=0.12.0",
    "pyarrow>=18.0.0",
    "scikit-image>=0.24.0",
    "bfio>=2.4.0",
    "beautifulsoup4>=4.12.0",
    "numpy>=2.0.0",
    "pandas>=2.2.0",
    "lxml>=5.0.0",
    "requests>=2.32.0",
    "pydantic>=2.0.0",
    "bump2version>=1.0.1",
    "mypy>=1.13.0",
    "tqdm>=4.66.0",
    "pytest>=8.0.0",
    "xmlschema>=2.6.0",
]

[project.optional-dependencies]
dev = []

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
filterwarnings = [
    "ignore:.*maven_scijava_repository.*:DeprecationWarning",
]
