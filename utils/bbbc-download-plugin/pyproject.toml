[tool.poetry]
name = "polus-plugins-utils-bbbc-download-plugin"
version = "0.1.0-dev1"
description = ""
authors = [
    "Saket Prem <saket.prem@axleinfo.com>", 
    "Matthew McIntyre <Matthew.McIntyre@axleinfo.com>"
    ]
readme = "README.md"
packages = [{include = "polus", from = "src"}]

[tool.poetry.dependencies]
python = ">=3.12"
typer = ">=0.24.0"
pyarrow = ">=23.0.0"
scikit-image = ">=0.25.0"
bfio = ">=2.5.0"
beautifulsoup4 = ">=4.14.3"
numpy = ">=1.26.0"
pandas = ">=2.2.3"
requests = ">=2.32.5"
pydantic = ">=2.12.5"
bump2version = "1.0.1"
mypy = ">=1.19.1"
tqdm = ">=4.67.0"
pytest = ">=9.0.0"
xmlschema = ">=4.3.1"
lxml = ">=6.0.2"


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
