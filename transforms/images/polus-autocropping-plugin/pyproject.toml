[project]
name = "polus-autocropping-plugin"
version = "1.0.2"
requires-python = ">=3.13"
dependencies = [
    "bfio>=2.5.0",
    "filepattern>=2.2.1",
    "scipy>=1.11.0",
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
