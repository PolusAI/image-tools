[project]
name = "polus-images-transforms-images-roi-relabel"
version = "0.2.6"
requires-python = ">=3.11"

[tool.poetry]
name = "polus-images-transforms-images-roi-relabel"
version = "0.2.6"
description = ""
authors = ["Najib Ishaq <najib.ishaq@nih.gov>"]
readme = "README.md"
packages = [{include = "polus", from = "src"}]

[tool.poetry.dependencies]
python = ">=3.11"
bfio = ">=2.5.0"
filepattern = ">=2.2.1"
typer = ">=0.24.0"
numpy = ">=1.26.4"
scipy = ">=1.8"
networkx = "^3.0"
tqdm = "^4.65.0"
watchdog = "3.0.0"  # Pinning this because: https://github.com/gorakhargosh/watchdog/issues/1030
scikit-image = ">=0.25.0"

[tool.poetry.group.dev.dependencies]
pytest = "^7.2.1"
pytest-cov = "^4.0.0"
pytest-sugar = "^0.9.6"
pytest-xdist = "^3.2.0"
pytest-benchmark = "^4.0.0"
bump2version = "^1.0.1"
pre-commit = "^3.0.4"
black = "^23.1.0"
ruff = "^0.0.275"
mypy = "^1.0.0"
matplotlib = "^3.6.3"
seaborn = "^0.12.2"
streamlit = "^1.18.1"
scikit-image = "^0.20.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
