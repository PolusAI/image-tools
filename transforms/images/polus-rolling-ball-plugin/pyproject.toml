[project]
name = "polus-rolling-ball-plugin"
version = "1.0.2"
requires-python = ">=3.13"
dependencies = [
    "bfio>=2.5.0",
    "scikit-image>=0.18.1",
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools]
py-modules = ["main", "rolling_ball"]
