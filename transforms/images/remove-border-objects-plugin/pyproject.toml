[project]
name = "polus-remove-border-objects-plugin"
version = "0.1.1"
requires-python = ">=3.13"
dependencies = [
    "bfio>=2.5.0",
    "filepattern>=2.2.1",
    "numpy>=2.4.3",
    "scikit-image>=0.25",
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools]
py-modules = ["main", "functions"]
