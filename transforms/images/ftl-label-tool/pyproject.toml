[project]
name = "polus-images-segmentation-ftl-label"
version = "1.0.0"
description = "Label objects in a 2D or 3D binary image using the FTL connected component algorithm."
readme = "README.md"
requires-python = ">=3.11,<3.13"
authors = [
    {name = "Nick Schaub",   email = "nick.schaub@nih.gov"},
    {name = "Najib Ishaq",   email = "najib.ishaq@axleinfo.com"},
    {name = "Hamdah Shafqat Abbasi",   email = "hamdah.abbasi@axleinfo.com"}
]
dependencies = [
    "typer>=0.9.0",
    "numpy>2.0.0",
    "bfio==2.5.0",
    "filepattern==2.1.4",
]

[project.optional-dependencies]
dev = [
    "bump2version>=1.0.1",
    "pre-commit>=3.1.0",
    "black>=23.1.0",
    "flake8>=6.0.0",
    "mypy>=1.0.1",
    "pytest>=7.2.1",
    "huggingface_hub>=1.6.0"
]

[build-system]
requires = [
    "setuptools>=68.0",
    "setuptools-rust>=1.9.0",
    "wheel",
    "cython>=3.0.11",
    "numpy>2.0.0",
]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where   = ["src"]
include = ["polus*", "ftl_rust*"]

[tool.mypy]
mypy_path        = "src"
strict           = true
warn_unreachable = true
warn_no_return   = true

[[tool.mypy.overrides]]
module = "ftl"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "ftl_rust"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "bfio"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "bfio.*"
ignore_missing_imports = true

# Ruff / pre-commit configuration
[tool.ruff]
# Ignore setup.py to prevent INP001 / E402 errors
exclude = ["setup.py"]

[tool.pytest.ini_options]
pythonpath = ["."]
