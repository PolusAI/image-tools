# pyproject.toml for ftl-label
#
# Two metadata tables coexist here:
#   [project]       – read by setuptools (PEP 621, required when
#                     build-backend = "setuptools.build_meta")
#   [tool.poetry]   – read by Poetry for virtualenv / lock-file management
#
# They must agree on name and version.

# ── PEP 621 metadata (setuptools reads this) ──────────────────────────────────
[project]
name = "polus-images-segmentation-ftl-label"
version = "0.3.12.dev5"
description = "Label objects in a 2D or 3D binary image using the FTL connected component algorithm."
readme = "README.md"
requires-python = ">=3.11,<3.13"
authors = [
    {name = "Nick Schaub",   email = "nick.schaub@nih.gov"},
    {name = "Najib Ishaq",   email = "najib.ishaq@axleinfo.com"},
]
# Runtime dependencies (mirrors [tool.poetry.dependencies])
dependencies = [
    "typer>=0.9.0",
    "numpy>2.0.0",
    "bfio[all]==2.5.0",
    "filepattern==2.1.4",
]

# ── Poetry metadata (Poetry reads this for venv / lock-file) ──────────────────
[tool.poetry]
name = "polus-images-segmentation-ftl-label"
version = "0.3.12-dev5"
description = "Label objects in a 2D or 3D binary image using the FTL connected component algorithm."
authors = [
    "Nick Schaub <nick.schaub@nih.gov>",
    "Najib Ishaq <najib.ishaq@axleinfo.com>",
]
readme = "README.md"
packages = [{include = "polus", from = "src"}]

[tool.poetry.dependencies]
python      = ">=3.11,<3.13"
typer       = ">=0.9.0"
numpy       = ">2.0.0"
bfio        = "2.5.0"
filepattern = "2.1.4"

[tool.poetry.group.dev.dependencies]
bump2version = "^1.0.1"
pre-commit   = "^3.1.0"
black        = "^23.1.0"
flake8       = "^6.0.0"
mypy         = "^1.0.1"
pytest       = "^7.2.1"

[tool.poetry.group.build.dependencies]
setuptools      = ">=68.0"
setuptools-rust = ">=1.9.0"
cython          = ">=3.0.11"

# ── Build system ───────────────────────────────────────────────────────────────
# setuptools.build_meta is required (not poetry-core) so that setuptools-rust
# can hook into the build and compile the Rust/Cython extensions via rust_setup.py.
[build-system]
requires = [
    "setuptools>=68.0",
    "setuptools-rust>=1.9.0",
    "wheel",
    "cython>=3.0.11",
    "numpy>2.0.0",
]
build-backend = "setuptools.build_meta"

# ── setuptools package discovery ──────────────────────────────────────────────
[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

# ── mypy ──────────────────────────────────────────────────────────────────────
[tool.mypy]
mypy_path        = "src"
strict           = true
warn_unreachable = true
warn_no_return   = true

[[tool.mypy.overrides]]
module = "ftl"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "ftl_rust"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "bfio"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "bfio.*"
ignore_missing_imports = true

# ── pytest ────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
pythonpath = ["."]