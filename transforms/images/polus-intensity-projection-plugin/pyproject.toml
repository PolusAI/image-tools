[project]
name = "polus-intensity-projection-plugin"
version = "0.1.10"
description = "Calculate volumetric intensity projections"
requires-python = ">=3.11"
dependencies = [
    "bfio>=2.5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
