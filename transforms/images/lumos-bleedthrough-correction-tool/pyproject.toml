[tool.poetry]
name = "polus-images-transforms-images-lumos-bleedthrough-correction"
version = "0.1.2"
description = ""
authors = ["Najib Ishaq <najib.ishaq@nih.gov>"]
readme = "README.md"
packages = [{include = "polus", from = "src"}]

[tool.poetry.dependencies]
python = ">=3.13"
bfio = ">=2.5.0"
filepattern = ">=2.2.1"
typer = ">=0.24.0"
tqdm = "^4.65.0"
scipy = "^1.11.0"
numpy = ">=2.4.3"
scikit-image = ">=0.25"

[tool.poetry.group.dev.dependencies]
pytest = "^7.2.1"
pytest-cov = "^4.0.0"
pytest-sugar = "^0.9.6"
pytest-xdist = "^3.2.0"
pytest-benchmark = "^4.0.0"
bump2version = "^1.0.1"
pre-commit = "^3.0.4"
black = "^23.1.0"
ruff = "^0.0.265"


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
