[project]
name = "polus-images-transforms-images-image-assembler"
version = "1.4.3-dev0"
requires-python = ">=3.11"

[tool.poetry]
name = "polus-images-transforms-images-image-assembler"
version = "1.4.3-dev0"
description = "A scalable image assembler plugin."
authors = ["Nick Schaub <nick.schaub@nih.gov>", "Antoine Gerardin <antoine.gerardin@gmail.com>"]
readme = "README.md"
packages = [{include = "polus", from = "src"}]

[tool.poetry.dependencies]
python = ">=3.11"
bfio = ">=2.5.0"
filepattern = ">=2.2.1"
typer = ">=0.24.0"
numpy = ">=1.26.4"


[tool.poetry.group.dev.dependencies]
bump2version = "^1.0.1"
flake8 = "^6.0.0"
pre-commit = "^3.2.1"
flake8-docstrings = "^1.7.0"
black = "^23.3.0"
mypy = "^1.1.1"
pytest = "^7.2.2"
ruff = "^0.0.270"
requests = "^2.31.0"
# polus-plugins = { path = "../../../", develop = false }

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
pythonpath = [
  "."
]
