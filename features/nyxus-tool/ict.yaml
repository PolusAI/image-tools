author:
  - Nick Schaub
  - Hamdah Shafqat
contact: nick.schaub@nih.gov
container: polusai/nyxus-tool:0.1.9-dev0
description:
  Nyxus plugin allows to make use of parallel pocessing for extracting
  nyxus features
entrypoint: python3 -m polus.images.features.nyxus_tool
inputs:
  - description: Collection containing intensity images
    format:
      - collection
    name: inpDir
    required: true
    type: path
  - description: Collection containing label images, i.e. groundtruth images
    format:
      - collection
    name: segDir
    required: true
    type: path
  - description: Filepattern to parse intensity images
    format:
      - string
    name: intPattern
    required: true
    type: string
  - description: Filepattern to parse label images
    format:
      - string
    name: segPattern
    required: true
    type: string
  - description: Features or feature groups to be extracted by nyxus plugin
    format:
      - array
    name: features
    required: false
    type: array
  - description: Consider intensity image as single roi and ignoring segmentation mask
    format:
      - boolean
    name: singleRoi
    required: false
    type: boolean
  - description: Nyxus parameters in KEY=VALUE format (repeatable)
    format:
      - array
    name: kwargs
    required: false
    type: array
name: polusai/Nyxustool
outputs:
  - description: Output collection
    format:
      - collection
    name: outDir
    required: true
    type: path
repository: https://github.com/PolusAI/image-tools
specVersion: 1.0.0
title: Nyxus tool
ui:
  - description: Input image collection
    key: inputs.inpDir
    title: inpDir
    type: path
  - description: Label image collection
    key: inputs.segDir
    title: segDir
    type: path
  - description: Filepattern to parse intensity images
    key: inputs.intPattern
    title: intPattern
    type: text
  - description: Filepattern to parse label images
    key: inputs.segPattern
    title: segPattern
    type: text
  - description: Features or feature groups to be extracted by nyxus plugin
    key: inputs.features
    title: features
    type: text
  - description: Consider intensity image as single roi and ignoring segmentation mask
    key: inputs.singleRoi
    title: singleRoi
    type: checkbox
    default: false
  - description: Nyxus parameters (repeatable KEY=VALUE, e.g. neighbor_distance=5)
    key: inputs.kwargs
    title: Nyxus kwargs
    type: text
version: 0.1.9-dev0
